<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <!-- Mayor: Citadel Tower (Largest) -->

  <!-- Base platform -->
  <rect x="10" y="140" width="100" height="20" fill="#3d3d3d" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="15" y="145" width="90" height="10" fill="#4a4a4a"/>

  <!-- Main tower body -->
  <rect x="25" y="50" width="70" height="90" fill="#5a4a3a" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Rust/weathering effects -->
  <rect x="30" y="60" width="10" height="15" fill="#8B4513" opacity="0.6"/>
  <rect x="80" y="75" width="8" height="20" fill="#8B4513" opacity="0.6"/>
  <rect x="45" y="100" width="12" height="10" fill="#654321" opacity="0.5"/>

  <!-- Windows/openings -->
  <rect x="40" y="65" width="8" height="12" fill="#1a1a1a"/>
  <rect x="72" y="65" width="8" height="12" fill="#1a1a1a"/>
  <rect x="40" y="90" width="8" height="12" fill="#1a1a1a"/>
  <rect x="72" y="90" width="8" height="12" fill="#1a1a1a"/>
  <rect x="56" y="77" width="8" height="12" fill="#1a1a1a"/>
  <rect x="40" y="115" width="8" height="12" fill="#1a1a1a"/>
  <rect x="72" y="115" width="8" height="12" fill="#1a1a1a"/>

  <!-- Top fortress section -->
  <polygon points="20,50 100,50 95,40 25,40" fill="#6a5a4a" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="25" y="25" width="70" height="15" fill="#7a6a5a" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Battlements -->
  <rect x="25" y="20" width="12" height="8" fill="#5a4a3a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="43" y="20" width="12" height="8" fill="#5a4a3a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="61" y="20" width="12" height="8" fill="#5a4a3a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="79" y="20" width="12" height="8" fill="#5a4a3a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Flag/antenna on top -->
  <line x1="60" y1="20" x2="60" y2="5" stroke="#CD853F" stroke-width="2"/>
  <polygon points="60,5 75,10 60,15" fill="#8B4513"/>

  <!-- Scaffolding details -->
  <line x1="25" y1="60" x2="20" y2="65" stroke="#4a4a4a" stroke-width="2"/>
  <line x1="95" y1="60" x2="100" y2="65" stroke="#4a4a4a" stroke-width="2"/>
  <line x1="25" y1="100" x2="20" y2="105" stroke="#4a4a4a" stroke-width="2"/>
</svg>
