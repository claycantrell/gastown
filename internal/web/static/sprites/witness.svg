<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <!-- Witness: Observation Tower (Medium) -->

  <!-- Base platform -->
  <rect x="10" y="105" width="60" height="15" fill="#3d3d3d" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="15" y="110" width="50" height="8" fill="#4a4a4a"/>

  <!-- Support structure (lattice tower) -->
  <polygon points="28,105 52,105 45,30 35,30" fill="none" stroke="#5a4a3a" stroke-width="3"/>

  <!-- Cross beams -->
  <line x1="30" y1="90" x2="50" y2="90" stroke="#5a4a3a" stroke-width="2"/>
  <line x1="31" y1="75" x2="49" y2="75" stroke="#5a4a3a" stroke-width="2"/>
  <line x1="32" y1="60" x2="48" y2="60" stroke="#5a4a3a" stroke-width="2"/>
  <line x1="33" y1="45" x2="47" y2="45" stroke="#5a4a3a" stroke-width="2"/>

  <!-- Diagonal supports -->
  <line x1="28" y1="105" x2="52" y2="90" stroke="#4a4a4a" stroke-width="1.5" opacity="0.7"/>
  <line x1="52" y1="105" x2="28" y2="90" stroke="#4a4a4a" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="75" x2="49" y2="60" stroke="#4a4a4a" stroke-width="1.5" opacity="0.7"/>
  <line x1="49" y1="75" x2="30" y2="60" stroke="#4a4a4a" stroke-width="1.5" opacity="0.7"/>

  <!-- Observation platform -->
  <rect x="25" y="20" width="30" height="12" fill="#6a5a4a" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="22" y="30" width="36" height="3" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Lookout cabin -->
  <rect x="30" y="8" width="20" height="12" fill="#7a6a5a" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Windows -->
  <rect x="33" y="11" width="4" height="6" fill="#1a1a1a"/>
  <rect x="43" y="11" width="4" height="6" fill="#1a1a1a"/>

  <!-- Roof -->
  <polygon points="28,8 52,8 50,3 30,3" fill="#5a4a3a" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Searchlight -->
  <circle cx="40" cy="25" r="3" fill="#FFD700" opacity="0.8" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="40" y1="25" x2="5" y2="40" stroke="#FFD700" stroke-width="1" opacity="0.3"/>

  <!-- Rust details -->
  <rect x="35" y="50" width="3" height="8" fill="#8B4513" opacity="0.6"/>
  <rect x="48" y="70" width="3" height="10" fill="#CD853F" opacity="0.5"/>

  <!-- Warning sign -->
  <polygon points="15,25 20,28 15,31" fill="#FF6347" stroke="#2a2a2a" stroke-width="1"/>
</svg>
