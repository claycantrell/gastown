<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 110" width="90" height="110">
  <!-- Deacon: Messenger Station (Medium) -->

  <!-- Base -->
  <rect x="15" y="95" width="60" height="15" fill="#3d3d3d" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="20" y="100" width="50" height="8" fill="#4a4a4a"/>

  <!-- Main building -->
  <rect x="25" y="50" width="40" height="45" fill="#5a4a3a" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Roof -->
  <polygon points="20,50 70,50 65,42 25,42" fill="#6a5a4a" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Antenna mast -->
  <rect x="43" y="10" width="4" height="35" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Antenna dishes and elements -->
  <ellipse cx="45" cy="15" rx="8" ry="3" fill="#6a6a6a" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="45" y1="15" x2="45" y2="12" stroke="#4a4a4a" stroke-width="2"/>

  <!-- Satellite dish -->
  <ellipse cx="45" cy="28" rx="10" ry="4" fill="#5a5a5a" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="45" cy="28" r="2" fill="#FFD700"/>

  <!-- Side antennas -->
  <line x1="30" y1="45" x2="30" y2="30" stroke="#4a4a4a" stroke-width="2"/>
  <line x1="60" y1="45" x2="60" y2="30" stroke="#4a4a4a" stroke-width="2"/>
  <circle cx="30" cy="30" r="3" fill="#CD853F" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="60" cy="30" r="3" fill="#CD853F" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Windows -->
  <rect x="32" y="60" width="8" height="10" fill="#1a1a1a"/>
  <rect x="50" y="60" width="8" height="10" fill="#1a1a1a"/>
  <rect x="41" y="75" width="8" height="10" fill="#1a1a1a"/>

  <!-- Door -->
  <rect x="38" y="85" width="14" height="10" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Communication equipment boxes -->
  <rect x="68" y="60" width="8" height="12" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="70" y="62" width="4" height="3" fill="#FF6347"/>
  <rect x="22" y="65" width="6" height="10" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Rust and weathering -->
  <rect x="30" y="55" width="6" height="8" fill="#8B4513" opacity="0.6"/>
  <rect x="52" y="72" width="8" height="10" fill="#CD853F" opacity="0.5"/>
  <circle cx="35" cy="88" r="3" fill="#8B4513" opacity="0.7"/>

  <!-- Signal waves (decorative) -->
  <path d="M 10,35 Q 15,30 20,35" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.4"/>
  <path d="M 70,35 Q 75,30 80,35" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.4"/>

  <!-- Wire connections -->
  <line x1="45" y1="45" x2="30" y2="50" stroke="#3d3d3d" stroke-width="1"/>
  <line x1="45" y1="45" x2="60" y2="50" stroke="#3d3d3d" stroke-width="1"/>
</svg>
