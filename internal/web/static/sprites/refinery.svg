<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Refinery: Industrial Complex (Medium) -->

  <!-- Base -->
  <rect x="5" y="85" width="90" height="15" fill="#3d3d3d" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Main tank body -->
  <rect x="15" y="40" width="35" height="45" fill="#6a5a4a" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="32.5" cy="40" rx="17.5" ry="8" fill="#7a6a5a" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Secondary tank -->
  <rect x="55" y="50" width="30" height="35" fill="#5a4a3a" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="70" cy="50" rx="15" ry="7" fill="#6a5a4a" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Rust effects -->
  <rect x="20" y="50" width="8" height="12" fill="#8B4513" opacity="0.7"/>
  <rect x="60" y="60" width="10" height="15" fill="#CD853F" opacity="0.6"/>
  <circle cx="40" cy="70" r="4" fill="#8B4513" opacity="0.8"/>

  <!-- Pipes -->
  <rect x="48" y="35" width="4" height="20" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="25" y="30" width="3" height="15" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="75" y="25" width="3" height="30" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Horizontal pipes -->
  <rect x="10" y="45" width="40" height="3" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="50" y="55" width="30" height="3" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Smokestacks -->
  <rect x="8" y="15" width="6" height="30" fill="#3d3d3d" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="86" y="20" width="6" height="30" fill="#3d3d3d" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="7" y="12" width="8" height="4" fill="#2a2a2a"/>
  <rect x="85" y="17" width="8" height="4" fill="#2a2a2a"/>

  <!-- Smoke -->
  <circle cx="11" cy="8" r="4" fill="#555555" opacity="0.5"/>
  <circle cx="89" cy="13" r="4" fill="#555555" opacity="0.5"/>
  <circle cx="14" cy="5" r="3" fill="#666666" opacity="0.4"/>

  <!-- Details/vents -->
  <rect x="30" y="55" width="5" height="3" fill="#2a2a2a"/>
  <rect x="65" y="65" width="4" height="3" fill="#2a2a2a"/>
  <line x1="20" y1="60" x2="45" y2="60" stroke="#2a2a2a" stroke-width="1"/>
</svg>
