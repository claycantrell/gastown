<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Town Desert Map</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --border: #0f3460;
            --green: #4ade80;
            --yellow: #facc15;
            --red: #f87171;

            /* Mad Max desert palette */
            --sand-light: #d4a574;
            --sand-dark: #b8905a;
            --sand-shadow: #8a6b42;
            --rust-orange: #c66c3a;
            --rust-red: #9a4521;
            --rust-brown: #6b3410;
            --tire-black: #2a2a2a;
            --rock-gray: #7a7566;
            --rock-light: #9a947d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .map-container {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #mapCanvas {
            border: 2px solid var(--border);
            border-radius: 4px;
            cursor: crosshair;
        }

        .controls {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .legend {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 8px;
        }

        .legend h3 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border: 1px solid var(--border);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>🏜️ Gas Town Desert Map</h1>
            <span class="refresh-info">
                Isometric view • Mad Max aesthetic
            </span>
        </header>

        <div class="map-container">
            <canvas id="mapCanvas" width="1200" height="800"></canvas>
        </div>

        <div class="controls">
            <span>Grid: 20x20</span>
            <span>•</span>
            <span>Tile size: 60px</span>
            <span>•</span>
            <span>Click to inspect coordinates</span>
        </div>

        <div class="legend">
            <h3>Terrain Features</h3>
            <div class="legend-item">
                <div class="legend-color" style="background: var(--sand-light);"></div>
                <span>Desert sand (base terrain)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: var(--rock-gray);"></div>
                <span>Rock formations</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: var(--tire-black);"></div>
                <span>Tire tracks</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: var(--rust-orange);"></div>
                <span>Rust patches</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');

        // Map configuration
        const GRID_WIDTH = 20;
        const GRID_HEIGHT = 20;
        const TILE_WIDTH = 60;
        const TILE_HEIGHT = 30;

        // Color palette
        const colors = {
            sandLight: '#d4a574',
            sandDark: '#b8905a',
            sandShadow: '#8a6b42',
            rustOrange: '#c66c3a',
            rustRed: '#9a4521',
            rustBrown: '#6b3410',
            tireBlack: '#2a2a2a',
            rockGray: '#7a7566',
            rockLight: '#9a947d'
        };

        // Convert grid coordinates to isometric screen coordinates
        function gridToIso(gridX, gridY) {
            const x = (gridX - gridY) * (TILE_WIDTH / 2);
            const y = (gridX + gridY) * (TILE_HEIGHT / 2);
            return { x: x + canvas.width / 2, y: y + 100 };
        }

        // Draw an isometric diamond tile
        function drawIsoDiamond(gridX, gridY, color) {
            const pos = gridToIso(gridX, gridY);

            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x + TILE_WIDTH / 2, pos.y + TILE_HEIGHT / 2);
            ctx.lineTo(pos.x, pos.y + TILE_HEIGHT);
            ctx.lineTo(pos.x - TILE_WIDTH / 2, pos.y + TILE_HEIGHT / 2);
            ctx.closePath();
            ctx.fill();

            // Add subtle outline
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        // Simple pseudorandom number generator (seeded)
        function seededRandom(seed) {
            const x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }

        // Get terrain color with variation
        function getTerrainColor(gridX, gridY) {
            const seed = gridX * 1000 + gridY;
            const rand = seededRandom(seed);

            // Base sand color with variation
            if (rand < 0.7) {
                return rand < 0.35 ? colors.sandLight : colors.sandDark;
            } else if (rand < 0.8) {
                return colors.sandShadow;
            } else if (rand < 0.9) {
                return colors.rockGray;
            } else {
                return colors.rustBrown;
            }
        }

        // Draw rock formation
        function drawRock(gridX, gridY, size) {
            const pos = gridToIso(gridX, gridY);

            // Draw rock shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.beginPath();
            ctx.ellipse(pos.x + 5, pos.y + TILE_HEIGHT / 2 + 5, size * 8, size * 4, 0, 0, Math.PI * 2);
            ctx.fill();

            // Draw main rock
            ctx.fillStyle = colors.rockGray;
            ctx.beginPath();
            ctx.ellipse(pos.x, pos.y + TILE_HEIGHT / 2, size * 8, size * 5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Highlight
            ctx.fillStyle = colors.rockLight;
            ctx.beginPath();
            ctx.ellipse(pos.x - 3, pos.y + TILE_HEIGHT / 2 - 2, size * 4, size * 2.5, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw tire tracks
        function drawTireTracks(gridX, gridY, direction) {
            const pos = gridToIso(gridX, gridY);

            ctx.strokeStyle = colors.tireBlack;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 3]);

            ctx.beginPath();
            if (direction === 'horizontal') {
                ctx.moveTo(pos.x - TILE_WIDTH / 2, pos.y + TILE_HEIGHT / 2);
                ctx.lineTo(pos.x + TILE_WIDTH / 2, pos.y + TILE_HEIGHT / 2);
            } else {
                ctx.moveTo(pos.x, pos.y);
                ctx.lineTo(pos.x, pos.y + TILE_HEIGHT);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Draw rust patch
        function drawRustPatch(gridX, gridY) {
            const pos = gridToIso(gridX, gridY);

            ctx.fillStyle = colors.rustOrange;
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y + TILE_HEIGHT / 2, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = colors.rustRed;
            ctx.beginPath();
            ctx.arc(pos.x - 3, pos.y + TILE_HEIGHT / 2 + 2, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }

        // Draw the complete map
        function drawMap() {
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw tiles (back to front for proper layering)
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    const color = getTerrainColor(x, y);
                    drawIsoDiamond(x, y, color);
                }
            }

            // Add environmental features
            // Rock formations (seeded positions)
            const rocks = [
                { x: 3, y: 2, size: 1.5 },
                { x: 7, y: 5, size: 2 },
                { x: 12, y: 8, size: 1.2 },
                { x: 15, y: 3, size: 1.8 },
                { x: 5, y: 15, size: 1.4 },
                { x: 18, y: 12, size: 1.6 },
                { x: 9, y: 18, size: 1.3 },
                { x: 2, y: 10, size: 2.1 }
            ];

            rocks.forEach(rock => {
                if (rock.x < GRID_WIDTH && rock.y < GRID_HEIGHT) {
                    drawRock(rock.x, rock.y, rock.size);
                }
            });

            // Tire tracks (crossing the map)
            for (let i = 2; i < 15; i += 2) {
                drawTireTracks(i, 7, 'horizontal');
                drawTireTracks(10, i, 'vertical');
            }

            // Rust patches (scattered)
            const rustPatches = [
                { x: 4, y: 4 },
                { x: 8, y: 9 },
                { x: 13, y: 6 },
                { x: 6, y: 14 },
                { x: 16, y: 11 },
                { x: 11, y: 16 }
            ];

            rustPatches.forEach(rust => {
                if (rust.x < GRID_WIDTH && rust.y < GRID_HEIGHT) {
                    drawRustPatch(rust.x, rust.y);
                }
            });
        }

        // Handle canvas clicks for grid coordinate inspection
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            // Find closest grid cell (simplified - good enough for demo)
            let minDist = Infinity;
            let closestX = 0;
            let closestY = 0;

            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    const pos = gridToIso(x, y);
                    const dist = Math.sqrt(
                        Math.pow(clickX - pos.x, 2) +
                        Math.pow(clickY - (pos.y + TILE_HEIGHT / 2), 2)
                    );

                    if (dist < minDist) {
                        minDist = dist;
                        closestX = x;
                        closestY = y;
                    }
                }
            }

            console.log(`Clicked grid cell: (${closestX}, ${closestY})`);

            // Highlight the cell
            drawMap();
            const pos = gridToIso(closestX, closestY);
            ctx.strokeStyle = '#facc15';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x + TILE_WIDTH / 2, pos.y + TILE_HEIGHT / 2);
            ctx.lineTo(pos.x, pos.y + TILE_HEIGHT);
            ctx.lineTo(pos.x - TILE_WIDTH / 2, pos.y + TILE_HEIGHT / 2);
            ctx.closePath();
            ctx.stroke();
        });

        // Initial render
        drawMap();
    </script>
</body>
</html>
